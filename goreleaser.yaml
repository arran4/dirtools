project_name: dirtools
builds:
  -
    id: "extdirisolate"
    binary: "extdirisolate"
    dir: cmd/extdirisolate
    env:
      - CGO_ENABLED=0
  -
    id: "dirquery"
    binary: "dirquery"
    dir: cmd/dirquery
    env:
      - CGO_ENABLED=0
archives:
  -
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
nfpms:
  -
    vendor: Ubels Software Development
    homepage: https://github.com/arran4/
    maintainer: Arran Ubels <arran@ubels.com.au>
    description: Collection of directory utilities for isolating and querying directories
    license: GPL-3.0-only
    formats:
      - apk
      - deb
      - rpm
      - termux.deb
      - archlinux
    release: 1
    section: default
    priority: extra