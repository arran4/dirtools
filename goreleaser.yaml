version: 2
project_name: dirtools
builds:
  -
    id: "extdirisolate"
    binary: "extdirisolate"
    dir: cmd/extdirisolate
    env:
      - CGO_ENABLED=0
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
  -
    id: "dirquery"
    binary: "dirquery"
    dir: cmd/dirquery
    env:
      - CGO_ENABLED=0
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
archives:
  -
    format_overrides:
      - goos: windows
        formats: ["zip"]
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ .Tag }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
nfpms:
  -
    vendor: Ubels Software Development
    homepage: https://github.com/arran4/
    maintainer: Arran Ubels <arran@ubels.com.au>
    description: Collection of directory utilities for isolating and querying directories
    license: GPL-3.0-only
    formats:
      - apk
      - deb
      - rpm
      - termux.deb
      - archlinux
    release: 1
    section: default
    priority: extra
dockers_v2:
  - id: extdirisolate
    images:
      - "ghcr.io/arran4/extdirisolate"
    tags:
      - "{{ .Tag }}"
    dockerfile: cmd/extdirisolate/Dockerfile
  - id: dirquery
    images:
      - "ghcr.io/arran4/dirquery"
    tags:
      - "{{ .Tag }}"
    dockerfile: cmd/dirquery/Dockerfile
homebrew_casks:
  -
    name: extdirisolate
    repository:
      owner: arran4
      name: homebrew-tap
      branch: "{{.ProjectName}}-{{.Version}}"
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
    directory: Casks
    homepage: "https://github.com/arran4/dirtools"
    description: "Collection of directory utilities for isolating directories"
    license: "GPL-3.0-only"
    ids:
      - extdirisolate
  -
    name: dirquery
    repository:
      owner: arran4
      name: homebrew-tap
      branch: "{{.ProjectName}}-{{.Version}}"
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
    directory: Casks
    homepage: "https://github.com/arran4/dirtools"
    description: "Collection of directory utilities for querying directories"
    license: "GPL-3.0-only"
    ids:
      - dirquery
